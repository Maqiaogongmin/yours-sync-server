name: Test

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python
        run: python -m py_compile backup_server.py smoke_test.py
      - name: Start server
        run: |
          YOURS_BACKUP_TOKEN=test-token \
          YOURS_BACKUP_DIR="$PWD/data" \
          YOURS_BACKUP_HOST=127.0.0.1 \
          YOURS_BACKUP_PORT=8088 \
          python backup_server.py > server.log 2>&1 &
          echo $! > server.pid
          sleep 2
      - name: Run smoke test
        run: python smoke_test.py --base-url http://127.0.0.1:8088 --token test-token
      - name: Print server log on failure
        if: failure()
        run: cat server.log || true
      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
